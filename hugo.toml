baseURL = "https://sanjaymajumdar.com.np/"
title = "Sanjay Majumdar"
theme = "blowfish"
locale = "en-us"
pluralizeListTitles = false

[outputs]
home = ["HTML", "JSON"]

[params]
  description = "Blog • Vlog • Travel • Entertainment • Tech Tips"

[params.author]
  name = "Sanjay Majumdar"
  headline = "Blogger | Traveler | IT Professional"
  bio = "Welcome to my blog about technology, travel, and entertainment"

[params.homepage]
  layout = "hybrid"
  showRecent = true
  showRecentItems = 10

[params.article]
  showDate = true
  showDateUpdated = true
  showBreadcrumbs = true
  showTableOfContents = true
  showTaxonomies = true

[params.comments]
  enabled = true
  provider = "giscus"

[params.comments.giscus]
  repo = "sanjayneal/sanjaymajumdar"
  repoId = "R_kgDOS8hGKA"
  category = "Announcements"
  categoryId = "DIC_kwDOS8hGKM4C_zn0"
  mapping = "pathname"
  strict = "0"
  reactionsEnabled = "1"
  emitMetadata = "0"
  inputPosition = "bottom"
  theme = "dark"
  lang = "en"

