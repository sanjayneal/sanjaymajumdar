<footer class="py-12 sm:py-16 md:py-20 print:hidden">
  <div class="max-w-screen-xl mx-auto px-3 sm:px-6 md:px-8">
    <div class="flex flex-col sm:flex-row sm:justify-between gap-8 sm:gap-12">
      <div>
        <h3 class="font-bold text-neutral-900 dark:text-neutral">{{ site.Title }}</h3>
        <p class="text-sm text-neutral-600 dark:text-neutral-400 mt-2">{{ site.Params.description }}</p>
      </div>
      {{ if site.Menus.footer }}
        <nav class="flex flex-col gap-2 text-sm">
          {{ range site.Menus.footer }}
            <a href="{{ .URL }}" class="text-neutral-600 hover:text-neutral-900 dark:text-neutral-400 dark:hover:text-neutral">
              {{ .Name }}
            </a>
          {{ end }}
        </nav>
      {{ end }}
    </div>
    <div class="mt-12 pt-8 border-t border-neutral-200 dark:border-neutral-700">
      <p class="text-xs text-neutral-600 dark:text-neutral-400">
        &copy; {{ now.Year }} {{ site.Title }}. All rights reserved.
      </p>
    </div>
  </div>
</footer>
